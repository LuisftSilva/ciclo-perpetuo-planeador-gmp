name: metrics-sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: Build encrypted metrics dataset
        env:
          METRICS_PASSWORD: ${{ secrets.METRICS_PASSWORD }}
        run: |
          if [ -z "${METRICS_PASSWORD}" ]; then
            echo "METRICS_PASSWORD secret is missing"
            exit 1
          fi
          python scripts/metrics_sync.py --repo-root "$GITHUB_WORKSPACE"

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html metrics/state.json metrics/data/metrics.enc.json
          git commit -m "chore(metrics): sync encrypted dashboard data [skip ci]"
          git push
